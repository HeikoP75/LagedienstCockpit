<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin – Bibliothek</title>
<style>body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:#f3f5f7;color:#263238}header{background:#20323b;color:#fff;padding:14px 18px;display:flex;justify-content:space-between}.btn{background:#455a64;color:#fff;border:none;border-radius:8px;padding:8px 12px;text-decoration:none;cursor:pointer}.primary{background:#004080}main{max-width:1100px;margin:16px auto;padding:0 12px}.card{background:#fff;border:1px solid #d5dde2;border-radius:10px;padding:14px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:10px}.group{display:flex;flex-direction:column;gap:6px}input,textarea{border:1px solid #c5ced6;border-radius:8px;padding:8px;font:inherit}.chips{display:flex;flex-wrap:wrap;gap:8px}.chips label{border:1px solid #c5ced6;border-radius:999px;padding:4px 10px;font-size:.9rem}.item{border:1px solid #d5dde2;border-radius:8px;padding:10px;margin-top:8px}.row{display:flex;justify-content:space-between;gap:8px;align-items:center}.muted{color:#546e7a;font-size:.9rem}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style>
</head>
<body>
<header><strong>Bibliothek verwalten</strong><div><a class="btn" href="admin.html">Admin-Start</a> <a class="btn" href="index.html">Startseite</a></div></header>
<main>
<section class="card"><form id="f"><input type="hidden" id="editId"><div class="grid"><div class="group"><label>Titel *</label><input name="title" required></div><div class="group"><label>Version</label><input name="version"></div></div><div class="group"><label>Beschreibung</label><textarea name="description"></textarea></div><div class="grid"><div class="group"><label>Tags (kommagetrennt)</label><input name="tags"></div><div class="group"><label>Link</label><input name="link"></div></div><div class="group"><label>Kategorien *</label><div class="chips"><label><input type="checkbox" name="categories" value="einsatzbearbeitung"> Einsatzbearbeitung</label><label><input type="checkbox" name="categories" value="stoerungsbearbeitung"> Störungsbearbeitung</label><label><input type="checkbox" name="categories" value="allgemein"> Allgemein</label><label><input type="checkbox" name="categories" value="lessonlearned"> Lesson Learned</label></div></div><button class="btn primary" type="submit">Speichern</button> <button class="btn" id="reset" type="button">Zurücksetzen</button><div id="status" class="muted"></div></form></section>
<section class="card"><h3>Alle Bibliothekseinträge</h3><div id="list"></div></section>
</main>
<script>
const KEY='bibliothek_custom_entries_v1';const form=document.getElementById('f'),list=document.getElementById('list'),statusEl=document.getElementById('status'),editId=document.getElementById('editId');
const load=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return []}};const save=v=>localStorage.setItem(KEY,JSON.stringify(v));
function clearForm(){form.reset();editId.value='';statusEl.textContent='';}
function render(){const arr=load();list.innerHTML='';if(!arr.length){list.innerHTML='<p class="muted">Noch keine Einträge vorhanden.</p>';return;}arr.forEach((m,i)=>{const el=document.createElement('div');el.className='item';el.innerHTML=`<div class="row"><strong>${m.title||'-'}</strong><div><button class="btn" data-edit="${i}" type="button">Bearbeiten</button> <button class="btn" data-del="${i}" type="button">Löschen</button></div></div><div class="muted">Kategorien: ${(m.categories||[]).join(', ')||'-'}</div>`;list.appendChild(el);});}
form.addEventListener('submit',e=>{e.preventDefault();const fd=new FormData(form);const title=(fd.get('title')||'').toString().trim();const categories=fd.getAll('categories').map(String);if(!title||!categories.length){statusEl.textContent='Titel und mindestens eine Kategorie sind Pflicht.';return;}const obj={id:editId.value||`${title.toLowerCase().replace(/[^a-z0-9]+/g,'-')}_${Date.now()}`,title,version:(fd.get('version')||'').toString().trim(),description:(fd.get('description')||'').toString().trim(),tags:(fd.get('tags')||'').toString().split(',').map(s=>s.trim().toLowerCase()).filter(Boolean),link:(fd.get('link')||'').toString().trim(),categories,attachments:[],createdAt:new Date().toISOString(),source:'admin'};const arr=load();const idx=arr.findIndex(x=>x.id===obj.id);if(idx>=0){const old=arr[idx];obj.attachments=old.attachments||[];arr[idx]=obj;}else arr.unshift(obj);save(arr);clearForm();render();statusEl.textContent='Gespeichert.';});
list.addEventListener('click',e=>{const eb=e.target.closest('[data-edit]'),db=e.target.closest('[data-del]');const arr=load();if(eb){const m=arr[Number(eb.dataset.edit)];if(!m)return;editId.value=m.id;form.title.value=m.title||'';form.version.value=m.version||'';form.description.value=m.description||'';form.tags.value=(m.tags||[]).join(', ');form.link.value=m.link||'';form.querySelectorAll("input[name='categories']").forEach(c=>c.checked=(m.categories||[]).includes(c.value));statusEl.textContent='Bearbeitungsmodus aktiv.';}if(db){arr.splice(Number(db.dataset.del),1);save(arr);render();statusEl.textContent='Gelöscht.';}});
document.getElementById('reset').addEventListener('click',clearForm);render();
</script>
</body></html>
