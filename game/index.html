<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisky Imperium – 1925</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- Header -->
  <header>
    <div id="header-left">
      <span class="game-title">Whisky Imperium</span>
      <span class="year-badge">Jahr: <strong id="display-year">1925</strong></span>
    </div>
    <div id="header-right">
      <span>Kapital: <strong id="display-money">£ 5.000</strong></span>
      <span>Ort: <strong id="display-location">London</strong></span>
      <span>Laderaum: <strong id="display-cargo">0 / 100</strong></span>
    </div>
  </header>

  <!-- Main Layout -->
  <div id="main">

    <!-- Left: Navigation / Map -->
    <aside id="sidebar">
      <h3>Reisen</h3>
      <div id="city-list"></div>

      <h3>Inventar</h3>
      <div id="cargo-list"><em>Leer</em></div>

      <h3>Whisky-Keller</h3>
      <div id="whisky-list"><em>Leer</em></div>
    </aside>

    <!-- Center: Market -->
    <main id="market-panel">
      <div id="market-header">
        <h2 id="market-city-name">Markt – London</h2>
        <button id="btn-next-turn" class="btn-primary">Runde beenden ▶</button>
      </div>
      <table id="market-table">
        <thead>
          <tr>
            <th>Ware</th>
            <th>Preis</th>
            <th>Trend</th>
            <th>Kaufen</th>
            <th>Verkaufen</th>
          </tr>
        </thead>
        <tbody id="market-body"></tbody>
      </table>

      <!-- Auction Section -->
      <div id="auction-section" class="hidden">
        <h2>Auktion</h2>
        <div id="auction-item-display"></div>
        <div id="auction-controls">
          <button id="btn-bid" class="btn-accent">Gebot abgeben</button>
          <button id="btn-pass" class="btn-secondary">Passen</button>
        </div>
        <div id="auction-log"></div>
      </div>
    </main>

    <!-- Right: Event / Info Log -->
    <aside id="info-panel">
      <h3>Ereignisse</h3>
      <div id="event-log"></div>

      <h3>Vermögen</h3>
      <div id="wealth-summary"></div>
    </aside>

  </div>

  <!-- Modal: Bid Input -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h3 id="modal-title">Gebot eingeben</h3>
      <p id="modal-desc"></p>
      <input type="number" id="modal-input" min="1" step="1">
      <div class="modal-buttons">
        <button id="modal-confirm" class="btn-primary">Bestätigen</button>
        <button id="modal-cancel" class="btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- Modal: Travel confirm -->
  <div id="travel-modal-overlay" class="hidden">
    <div id="modal">
      <h3 id="travel-modal-title">Reisen nach …</h3>
      <p id="travel-modal-desc"></p>
      <div class="modal-buttons">
        <button id="travel-confirm" class="btn-primary">Reisen</button>
        <button id="travel-cancel" class="btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
